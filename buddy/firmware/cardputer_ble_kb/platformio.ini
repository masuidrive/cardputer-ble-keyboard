; BLE HID keyboard firmware for the M5Stack Cardputer-Adv.
;
; Why a dedicated firmware exists at all: UIFlow 2.0's MicroPython
; BLE build has a broken SMP — pairing fails with enc=0 against
; macOS, iOS and Android alike (one fluke success in dozens of
; attempts; see buddy/device/apps/ble_keyboard.py for the full
; experiment log). The Arduino Bluedroid stack has working
; pairing/bonding, so the keyboard lives here. Flashing this image
; replaces UIFlow entirely; `m5-onboard go` restores the buddy
; bundle whenever the device should go back to being a Buddy.
;
; Hardware: ESP32-S3-FN8 — 8 MB flash, no PSRAM (read off the
; running device via esp.flash_size() / uname).

[env:cardputer-adv]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
lib_deps =
    m5stack/M5Cardputer@^1.1.1
    t-vk/ESP32 BLE Keyboard@^0.3.2
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Use the NimBLE host instead of Bluedroid. Bluedroid on the
    ; BLE-only ESP32-S3 wedges HID pairing with macOS: it attempts
    ; Cross-Transport Key Derivation (BR/EDR link key from the LE
    ; LTK) on a chip with no Classic radio, failing with
    ; "smp_derive_link_key_from_long_term_key failed / sm4=0x00" and
    ; never completing encryption (GATT_INSUF_AUTHENTICATION). The
    ; T-vK library also hardcodes MITM-required with NoInputOutput,
    ; a contradiction that feeds that path. NimBLE does no CTKD; the
    ; firmware downgrades to Just-Works (no MITM) in setup().
    -DUSE_NIMBLE
    ; Multi-host: bonds for every slot's host coexist in NimBLE's NVS
    ; store. Raise the bond/CCCD ceilings above the per-host count so
    ; pairing a new slot never evicts another slot's bond. Each host
    ; subscribes to ~2-3 notify chars (HID input + battery).
    -DCONFIG_BT_NIMBLE_MAX_BONDS=6
    -DCONFIG_BT_NIMBLE_MAX_CCCDS=24
monitor_speed = 115200
